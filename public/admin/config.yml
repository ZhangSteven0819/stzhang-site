backend:
  name: github
  repo: ZhangSteven0819/stzhang-site
  branch: main
  base_url: https://stzhang-site.pages.dev
  auth_endpoint: api/auth

site_url: "https://stzhang-site.pages.dev"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "pages"
    label: "Pages"
    folder: "src/pages"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Body", name: "body", widget: "markdown" }

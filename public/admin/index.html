<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <title>内容管理 · ST Zhang</title>
    <link rel="stylesheet" href="/admin/admin.css" />
    <script src="https://unpkg.com/decap-cms@latest/dist/decap-cms.js"></script>
    <script src="/admin/admin-zh.js"></script>
    <script>
      if (window.CMS) {
        CMS.registerPreviewStyle("/admin/admin.css");
        
        // Register preview template for pages
        CMS.registerPreviewTemplate("pages", function(data) {
          var body = data.getIn(["data", "body"]) || "";
          var title = data.getIn(["data", "title"]) || "Untitled";
          var description = data.getIn(["data", "description"]) || "";
          
          // Simple markdown to HTML converter
          var html = body
            .replace(/^### (.+)$/gm, '<h3>$1</h3>')
            .replace(/^## (.+)$/gm, '<h2>$1</h2>')
            .replace(/^# (.+)$/gm, '<h1>$1</h1>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`(.+?)`/g, '<code>$1</code>')
            .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>');
          
          return '<!doctype html><html><head>' +
            '<meta charset="utf-8">' +
            '<link rel="stylesheet" href="/admin/admin.css">' +
            '<style>' +
            '.preview-content { max-width: 760px; margin: 0 auto; padding: 48px 24px; font-family: "Newsreader", "Noto Serif SC", Georgia, serif; }' +
            '.preview-content h1 { color: #f0eeeb; font-size: 2.5rem; font-weight: 400; margin: 0 0 24px; }' +
            '.preview-content h2 { color: #f0eeeb; font-size: 1.75rem; font-weight: 400; margin: 48px 0 16px; }' +
            '.preview-content h3 { color: #f0eeeb; font-size: 1.4rem; font-weight: 400; margin: 36px 0 12px; }' +
            '.preview-content p { color: #f0eeeb; font-size: 1.1rem; line-height: 1.8; margin: 0 0 1.5em; }' +
            '.preview-content a { color: #f0eeeb; }' +
            '.preview-content code { background: #141615; padding: 2px 6px; border-radius: 4px; }' +
            '.preview-content strong { color: #f0eeeb; }' +
            '.preview-content em { color: #aaa6a1; }' +
            '</style></head><body>' +
            '<div class="preview-content">' +
            '<h1>' + title + '</h1>' +
            (description ? '<p style="color:#aaa6a1;margin-bottom:32px;">' + description + '</p>' : '') +
            '<div>' + html + '</div>' +
            '</div></body></html>';
        });
      }
    </script>
  </body>
</html>

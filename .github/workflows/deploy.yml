name: Deploy to Cloudflare Pages

on:
  # Pages production deploy is handled by Cloudflare native Git integration.
  # Keep this workflow as manual fallback only.
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write

    env:
      CF_PAGES_PROD_PROJECT: ${{ vars.CF_PAGES_PROD_PROJECT }}
      CF_PAGES_DEPLOY_BRANCH: ${{ vars.CF_PAGES_DEPLOY_BRANCH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Pages
        run: ./scripts/deploy-main.sh
        env:
          CF_PAGES_PROD_PROJECT: ${{ env.CF_PAGES_PROD_PROJECT }}
          CF_PAGES_DEPLOY_BRANCH: ${{ env.CF_PAGES_DEPLOY_BRANCH }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
